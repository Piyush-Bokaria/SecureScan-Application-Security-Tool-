name: 🛡️ SecureScan Security Analysis

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  security-scan:
    name: SAST Security Scan
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up Python ────────────────────────────────────────
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ─────────────────────────────────
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Run SecureScan (JSON report) ─────────────────────────
      - name: 🔍 Run SecureScan (JSON)
        id: scan
        run: |
          python -m securescanner . --format json --output securescanner-report.json
          echo "scan_exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ── 5. Run SecureScan (HTML report) ─────────────────────────
      - name: 📄 Run SecureScan (HTML)
        run: |
          python -m securescanner . --format html --output securescanner-report.html
        continue-on-error: true

      # ── 6. Upload reports as artifacts ──────────────────────────
      - name: 📤 Upload scan reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: securescanner-reports
          path: |
            securescanner-report.json
            securescanner-report.html
          retention-days: 30

      # ── 7. Post PR comment with results ─────────────────────────
      - name: 💬 Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let report;
            try {
              const raw = fs.readFileSync('securescanner-report.json', 'utf8');
              report = JSON.parse(raw);
            } catch (e) {
              console.log('No report file found, skipping comment.');
              return;
            }

            const scan = report.scan || {};
            const summary = scan.summary || {};
            const severityCounts = summary.severity_counts || {};
            const findings = scan.findings || [];
            const owaspSummary = report.owasp_summary || {};

            const total = summary.total_findings || 0;
            const high = severityCounts.HIGH || 0;
            const medium = severityCounts.MEDIUM || 0;
            const low = severityCounts.LOW || 0;

            const status = high > 0 ? '❌ **FAIL**' : '✅ **PASS**';
            const statusIcon = high > 0 ? '🔴' : '🟢';

            // Build OWASP category lines
            let owaspLines = '';
            for (const [id, data] of Object.entries(owaspSummary)) {
              owaspLines += `| ${id} | ${data.name} | ${data.count} | ${data.severity_breakdown.HIGH} | ${data.severity_breakdown.MEDIUM} | ${data.severity_breakdown.LOW} |\n`;
            }

            // Build top findings (max 10)
            let findingLines = '';
            const topFindings = findings.slice(0, 10);
            for (const f of topFindings) {
              const icon = f.severity === 'HIGH' ? '🔴' : f.severity === 'MEDIUM' ? '🟡' : '🔵';
              const shortFile = f.filename.split('/').pop();
              findingLines += `| ${icon} ${f.severity} | \`${f.test_id}\` | ${f.issue_text} | \`${shortFile}:${f.line_number}\` | ${f.owasp_id} |\n`;
            }
            if (findings.length > 10) {
              findingLines += `| ... | ... | *${findings.length - 10} more finding(s)* | ... | ... |\n`;
            }

            const body = `## ${statusIcon} SecureScan Security Report

            ${status} — **${total}** finding(s) across **${Object.keys(owaspSummary).length}** OWASP category(ies)

            ### 📊 Summary

            | Severity | Count |
            |----------|-------|
            | 🔴 High | **${high}** |
            | 🟡 Medium | **${medium}** |
            | 🔵 Low | **${low}** |
            | **Total** | **${total}** |

            ${owaspLines ? `### 🏛️ OWASP Top 10 Breakdown\n\n| OWASP ID | Category | Total | High | Medium | Low |\n|----------|----------|-------|------|--------|-----|\n${owaspLines}` : ''}

            ${findingLines ? `### 📋 Top Findings\n\n| Severity | Test | Issue | Location | OWASP |\n|----------|------|-------|----------|-------|\n${findingLines}` : ''}

            ---
            > 📎 Full reports (JSON + HTML) are available in the workflow artifacts.
            > 🛡️ *Generated by [SecureScan](https://github.com/Piyush-Bokaria/SecureScan-Application-Security-Tool-) v1.0.0*
            `.replace(/^ {12}/gm, '');

            // Find and update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('SecureScan Security Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # ── 8. Fail if HIGH severity issues found ──────────────────
      - name: 🚨 Check for HIGH severity issues
        run: |
          python -c "
          import json, sys
          try:
              with open('securescanner-report.json') as f:
                  report = json.load(f)
              high = report.get('scan', {}).get('summary', {}).get('severity_counts', {}).get('HIGH', 0)
              if high > 0:
                  print(f'❌ FAILED: {high} HIGH severity issue(s) found.')
                  sys.exit(1)
              else:
                  print('✅ No HIGH severity issues found.')
          except FileNotFoundError:
              print('⚠️ Report file not found, skipping check.')
          "
